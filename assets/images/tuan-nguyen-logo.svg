<svg xmlns="http://www.w3.org/2000/svg" width="180" height="40" viewBox="0 0 180 40" fill="none">
  <defs>
    <linearGradient id="tnGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0BCEAF"/>
      <stop offset="100%" stop-color="#1C93E5"/>
    </linearGradient>
  </defs>
  
  <!-- Icon: Modern stacked layers representing full-stack + stylized TN monogram -->
  <g>
    <!-- Background shape for icon -->
    <rect x="2" y="4" width="32" height="32" rx="6" fill="url(#tnGradient)" opacity="0.15"/>
    <rect x="2" y="4" width="32" height="32" rx="6" stroke="url(#tnGradient)" stroke-width="2"/>
    
    <!-- Layers for full-stack -->
    <rect x="8" y="10" width="20" height="4" rx="1" fill="#0BCEAF"/>
    <rect x="8" y="17" width="20" height="4" rx="1" fill="#1C93E5"/>
    <rect x="8" y="24" width="20" height="4" rx="1" fill="#0BCEAF"/>
    
    <!-- TN overlay / monogram accent -->
    <text x="18" y="25.5" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#fff" text-anchor="middle" dominant-baseline="middle">TN</text>
  </g>
  
  <!-- Name -->
  <text x="44" y="18.5" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="17" font-weight="600" fill="#fff" letter-spacing="-0.5">Tuan Nguyen</text>
  <text x="44" y="32" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="9" font-weight="500" fill="#0BCEAF" letter-spacing="1.5">FULL STACK DEVELOPER</text>
</svg>