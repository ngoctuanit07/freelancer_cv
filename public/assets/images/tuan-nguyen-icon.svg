<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" fill="none">
  <defs>
    <linearGradient id="iconGradient" x1="20%" y1="20%" x2="80%" y2="80%">
      <stop offset="0%" stop-color="#0BCEAF"/>
      <stop offset="100%" stop-color="#1C93E5"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0BCEAF"/>
      <stop offset="100%" stop-color="#1C93E5"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="256" height="256" rx="52" fill="#100e17"/>
  
  <!-- Main rounded square with gradient border -->
  <rect x="22" y="22" width="212" height="212" rx="38" fill="#202026" stroke="url(#iconGradient)" stroke-width="14"/>
  
  <!-- Three layers representing full stack -->
  <rect x="58" y="62" width="140" height="26" rx="6" fill="#0BCEAF"/>
  <rect x="58" y="102" width="140" height="26" rx="6" fill="#1C93E5"/>
  <rect x="58" y="142" width="140" height="26" rx="6" fill="#0BCEAF"/>
  
  <!-- Central TN monogram -->
  <text x="128" y="132" font-family="Arial, system-ui, sans-serif" font-size="52" font-weight="800" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">TN</text>
  
  <!-- Small accent brackets for developer -->
  <text x="128" y="200" font-family="monospace" font-size="28" font-weight="700" fill="#0BCEAF" text-anchor="middle">&lt;/&gt;</text>
</svg>